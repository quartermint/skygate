---
- name: Create static files directory
  ansible.builtin.file:
    path: "{{ dashboard_static_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy dashboard daemon binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../bin/skygate-dashboard-linux-arm64"
    dest: "{{ skygate_opt_dir }}/skygate-dashboard"
    owner: root
    group: root
    mode: "0755"
  notify:
    - restart skygate-dashboard

- name: Deploy static files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../pi/static/"
    dest: "{{ dashboard_static_dir }}/"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"
  notify:
    - reload caddy

- name: Deploy dashboard config
  ansible.builtin.template:
    src: dashboard.yaml.j2
    dest: "{{ skygate_config_dir }}/dashboard.yaml"
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart skygate-dashboard

- name: Deploy domain categories
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../pi/config/domain-categories.yaml"
    dest: "{{ skygate_config_dir }}/domain-categories.yaml"
    owner: root
    group: root
    mode: "0644"
  notify:
    - restart skygate-dashboard

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload caddy

- name: Deploy systemd service
  ansible.builtin.template:
    src: skygate-dashboard.service.j2
    dest: /etc/systemd/system/skygate-dashboard.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart skygate-dashboard

- name: Deploy nftables dashboard additions
  ansible.builtin.template:
    src: nftables-dashboard.conf.j2
    dest: /etc/nftables.d/dashboard.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload nftables

- name: Install Caddy binary
  ansible.builtin.get_url:
    url: "https://caddyserver.com/api/download?os=linux&arch=arm64"
    dest: /usr/local/bin/caddy
    mode: "0755"
    creates: /usr/local/bin/caddy

- name: Create Caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create nftables include directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Enable and start dashboard daemon
  ansible.builtin.systemd:
    name: skygate-dashboard
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
    daemon_reload: true
