---
# Network interfaces
ap_interface: wlan1          # USB WiFi adapter (MT7612U)
uplink_interface: eth0       # Ethernet to Starlink Mini
ap_subnet: "192.168.4.0/24"
ap_gateway: "192.168.4.1"
dhcp_range_start: "192.168.4.100"
dhcp_range_end: "192.168.4.200"
domain_name: "skygate.local"

# WiFi AP (per D-06, D-07, D-08, D-09)
wifi_ssid: "SkyGate"          # Overridden by first-boot
wifi_password: "PLACEHOLDER"  # Overridden by first-boot
wifi_channel: 6               # Non-overlapping 2.4 GHz channel
wifi_country_code: "US"
max_clients: 8

# QoS (CAKE autorate)
cake_min_rate_kbps: 5000      # 5 Mbps floor
cake_base_rate_kbps: 20000    # 20 Mbps baseline
cake_max_rate_kbps: 100000    # 100 Mbps ceiling
cake_baseline_rtt_ms: 40      # Starlink baseline RTT
cake_threshold_ms: 15         # Latency increase threshold
cake_decrease_factor: "0.7"   # Drop to 70% on bufferbloat
cake_increase_step_kbps: 5000 # 5 Mbps increase per cycle
cake_stable_threshold: 5      # Cycles before increasing
autorate_reflector: "1.1.1.1"
autorate_interval_s: 2

# Paths
skygate_data_dir: "/data/skygate"
skygate_opt_dir: "/opt/skygate"
skygate_config_dir: "/data/skygate"

# Dashboard daemon
dashboard_port: 8081
dashboard_poll_interval_sec: 5
dashboard_db_path: "{{ skygate_data_dir }}/dashboard.db"
dashboard_categories_file: "{{ skygate_config_dir }}/domain-categories.yaml"
dashboard_static_dir: "{{ skygate_opt_dir }}/static"
pihole_address: "http://localhost:8080"
pihole_password: ""
caddy_port: 80

# WireGuard tunnel (Phase 3)
wg_enabled: false
wg_interface: wg0
wg_listen_port: 51820
wg_client_address: "10.13.13.2"
wg_subnet_mask: "24"
wg_mtu: 1420
wg_keepalive: 25
wg_server_public_key: "PLACEHOLDER"
wg_server_endpoint: "PLACEHOLDER"
wg_server_port: 51820
wg_private_key: "PLACEHOLDER"

# Tunnel monitor
tunnel_monitor_check_interval_s: 5
tunnel_monitor_handshake_timeout_s: 180
tunnel_monitor_recovery_threshold_s: 30
tunnel_monitor_fail_count: 3
tunnel_monitor_recover_count: 3

# CAKE on WireGuard (Phase 3)
wg_cake_base_rate_kbps: 15000
wg_cake_min_rate_kbps: 3000
wg_cake_max_rate_kbps: 80000
