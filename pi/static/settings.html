<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkyGate Settings</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <header>
        <h1>SkyGate Settings</h1>
        <nav><a href="/static/index.html">&larr; Dashboard</a></nav>
    </header>
    <main>
        <form hx-put="/api/settings" hx-target="#save-result" hx-swap="innerHTML">
            <div class="form-group">
                <label for="plan_cap_gb">Starlink Plan Cap (GB)</label>
                <input type="number" id="plan_cap_gb" name="plan_cap_gb"
                       min="1" max="1000" step="1"
                       placeholder="20">
                <small>Your monthly Starlink data cap in gigabytes</small>
            </div>
            <div class="form-group">
                <label for="billing_cycle_start">Billing Cycle Start Day</label>
                <input type="number" id="billing_cycle_start" name="billing_cycle_start"
                       min="1" max="31" step="1" placeholder="1">
                <small>Day of month your Starlink billing cycle resets</small>
            </div>
            <div class="form-group">
                <label for="overage_rate_per_mb">Overage Rate ($/MB)</label>
                <input type="number" id="overage_rate_per_mb" name="overage_rate_per_mb"
                       min="0" max="1" step="0.001" placeholder="0.01">
                <small>Cost per megabyte over your plan cap</small>
            </div>
            <button type="submit" class="save-btn">Save Settings</button>
            <div id="save-result"></div>
        </form>
    </main>
    <script>
    // Pre-populate form with saved settings on page load.
    // GET /api/settings returns JSON: {plan_cap_gb, billing_cycle_start, overage_rate_per_mb}
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/settings')
            .then(function(r) { return r.json(); })
            .then(function(settings) {
                var fields = ['plan_cap_gb', 'billing_cycle_start', 'overage_rate_per_mb'];
                fields.forEach(function(key) {
                    var el = document.getElementById(key);
                    if (el && settings[key] !== undefined) {
                        el.value = settings[key];
                    }
                });
            })
            .catch(function(err) {
                console.warn('Could not load settings:', err);
            });
    });
    </script>
</body>
</html>
