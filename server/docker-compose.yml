# SkyGate Remote Server - WireGuard + Content Compression Proxy
# Usage: docker compose up -d
# Phase 3: WireGuard tunnel endpoint
# Phase 4: Content compression proxy (MITM + image transcoding + minification)

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: skygate-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
      - SERVERURL=${SERVERURL:?Set SERVERURL to server public IP or domain}
      - SERVERPORT=${SERVERPORT:-51820}
      - PEERS=${PEERS:-skygate-pi}
      - INTERNAL_SUBNET=${INTERNAL_SUBNET:-10.13.13.0}
      - ALLOWEDIPS=0.0.0.0/0
      - PERSISTENTKEEPALIVE_PEERS=all
      - LOG_CONFS=true
    volumes:
      - ./wireguard-config:/config
      - /lib/modules:/lib/modules
    ports:
      - "${SERVERPORT:-51820}:51820/udp"
      - "8443:8443"    # Proxy HTTPS listen port (exposed via WG container per network_mode pattern)
      - "8080:8080"    # CA cert download + health endpoint
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  proxy:
    build:
      context: ..
      dockerfile: server/Dockerfile.proxy
    container_name: skygate-proxy
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    volumes:
      - proxy-data:/data/skygate
      - ./proxy-config.yaml:/etc/skygate/proxy.yaml:ro
      - ./bypass-domains.yaml:/etc/skygate/bypass-domains.yaml:ro
    environment:
      - SKYGATE_CONFIG=/etc/skygate/proxy.yaml
    restart: unless-stopped

volumes:
  proxy-data:
    driver: local
